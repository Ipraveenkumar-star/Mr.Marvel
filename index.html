<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPK's Marvel — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0a0e;
    --void-2:#12111a;
    --silver:#c9cdd6;
    --silver-dim:#8b8d9a;
    --white:#f4f4f7;
    --red:#e0263c;
    --red-dim:#eb112b;
    --gold:#b08a3e;
    --line: rgba(201,205,214,0.12);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--void);
    color:var(--white);
    font-family:'Inter',sans-serif;
    overflow:hidden;
    height:100vh;
  }

  ::selection{ background:var(--red); color:var(--white); }

  .home-screen{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:var(--void);
    overflow:hidden;
    transition:opacity 0.7s cubic-bezier(.4,0,.2,1), transform 0.7s cubic-bezier(.4,0,.2,1);
  }
  .home-screen.leaving{
    opacity:0;
    transform:scale(1.08);
    pointer-events:none;
  }

  .home-bg{ position:absolute; inset:0; z-index:0; overflow:hidden; }
  .home-bg-img{
       position:absolute; inset:0;
       background-image:url('ironman1.png');
       background-size:cover;
       background-position:center 30%;
  }
  .home-bg-img {
    background-image: url('ironman1.png');
    opacity:1;
}

.home-bg-scrim {
    background-image: url('marvel1.png');
    opacity: 0;
    transition: opacity 3.5s ease-in-out;
}

 /* .home-bg-img{
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 38%, rgba(224,38,60,0.35), transparent 70%),
      radial-gradient(ellipse 45% 60% at 50% 100%, rgba(176,138,62,0.28), transparent 70%),
      linear-gradient(160deg, #3a0a10 0%, #160608 35%, #0a0a0e 70%);
    animation: heroDrift 14s ease-in-out infinite alternate;
  }*/
  @keyframes heroDrift{
    0%{ background-position:0% 0%, 0% 0%, 0% 0%; }
    100%{ background-position:3% 4%, -3% -2%, 0% 0%; }
  }
  .home-bg-scrim{
    position:absolute; inset:0;
    background:radial-gradient(ellipse at 50% 45%, transparent 25%, rgba(10,10,14,0.55) 75%, var(--void) 100%);
    transition: 0.3s ease;
    background-image:url('marvel1.png');
    background-size:cover;
  }
  .arc-glow{
    position:absolute;
    left:50%; top:42%;
    width:140px; height:140px;
    transform:translate(-50%,-50%);
    border-radius:50%;
    background:radial-gradient(circle, rgba(120,220,255,0.85) 0%, rgba(224,38,60,0.4) 45%, transparent 75%);
    box-shadow:0 0 80px 20px rgba(224,38,60,0.35), 0 0 140px 60px rgba(120,220,255,0.12);
    animation: arcPulse 2.6s ease-in-out infinite;
  }
  @keyframes arcPulse{
    0%,100%{ opacity:0.75; transform:translate(-50%,-50%) scale(1); }
    50%{ opacity:1; transform:translate(-50%,-50%) scale(1.12); }
  }
  .home-particles{ position:absolute; inset:0; }
  .home-particles span{
    position:absolute;
    width:3px; height:3px;
    background:var(--gold);
    border-radius:50%;
    opacity:0.6;
    animation:emberRise linear infinite;
  }
  @keyframes emberRise{
    0%{ transform:translateY(0) translateX(0); opacity:0; }
    10%{ opacity:0.7; }
    100%{ transform:translateY(-110vh) translateX(var(--drift,20px)); opacity:0; }
  }

  .home-content{
    position:relative; z-index:2;
    display:flex; flex-direction:column; align-items:center;
    text-align:center;
    padding:32px;
    animation:homeIn 1s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes homeIn{
    from{ opacity:0; transform:translateY(18px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .home-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.32em;
    color:var(--gold);
    margin-bottom:18px;
  }
  .home-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(40px, 9vw, 104px);
    line-height:1.0;
    letter-spacing:0.02em;
    color:var(--white);
    text-shadow:0 0 50px rgba(224,38,60,0.4);
  }
  .home-title span{
    color:var(--red);
    -webkit-text-stroke:1px rgba(255,255,255,0.15);
  }
  .home-sub{
    margin-top:18px;
    font-size:15px;
    color:var(--silver-dim);
    max-width:480px;
    line-height:1.6;
  }

  .enter-btn{
    margin-top:38px;
    display:inline-flex; align-items:center; gap:10px;
    padding:16px 34px;
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--white);
    background:linear-gradient(135deg, var(--red), var(--red-dim));
    border:1px solid rgba(224,38,60,0.6);
    border-radius:10px;
    cursor:pointer;
    box-shadow:0 8px 28px rgba(224,38,60,0.35);
    transition:transform 0.2s ease, box-shadow 0.2s ease;
  }
  .enter-btn svg{ width:16px; height:16px; transition:transform 0.2s ease; }
  .enter-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 36px rgba(224,38,60,0.5);
  }
  .enter-btn:hover svg{ transform:translateX(3px); }
  .enter-btn:active{ transform:translateY(0); }

  .home-hint{
    margin-top:16px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--silver-dim);
  }
  .home-hint kbd{
    font-family:'JetBrains Mono',monospace;
    background:var(--void-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:2px 7px;
    color:var(--silver);
  }

  .home-progress{
    position:absolute; left:0; bottom:0; height:2px;
    width:0%;
    background:linear-gradient(90deg, var(--gold), var(--red));
    z-index:3;
  }

  @media (max-width:560px){
    .home-title{ font-size:clamp(34px, 11vw, 64px); }
    .enter-btn{ padding:14px 26px; font-size:12px; }
  }
</style>
</head>
<body>

<div class="home-screen" id="homeScreen">
  <div class="home-bg">
    <div class="home-bg-img" src="ironman.png" id="bgImg"></div>
    <div class="home-bg-scrim" src="marvel1.png" id="bgScrim"></div>
    <div class="arc-glow"></div>
    <div class="home-particles" id="homeParticles"></div>
    <div class="container">
  
</div>
  </div>

  <div class="home-content">
    <div class="home-eyebrow">I · P · K &nbsp;PRESENTS</div>
    <h1 class="home-title">WELCOME TO<br><span>IPK'S MARVEL</span></h1>
    <p class="home-sub">The complete cinematic archive — every file, every era, indexed and ready.</p>

    <button class="enter-btn" id="enterBtn">
      <span>ENTER THE ARCHIVE</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>

    <div class="home-hint">press <kbd>Enter</kbd> or click to continue</div>
  </div>

  <div class="home-progress" id="homeProgress"></div>
</div>

<script>
const image2 = document.getElementById('bgScrim');
document.addEventListener('mousemove', () => {
    image2.style.opacity = '1';
});

document.addEventListener('mouseleave', () => {
    image2.style.opacity = '0';
});
</script>

<script>
  /* ============================================================
     NAVIGATION TARGET
     This is the file the Enter button / auto-timer sends you to.
     If you rename archive.html, update this value to match.
     ============================================================ */
  const ARCHIVE_URL = 'archive.html';

  const homeEl = document.getElementById('homeScreen');
  const enterBtn = document.getElementById('enterBtn');
  const progressEl = document.getElementById('homeProgress');
  const particlesEl = document.getElementById('homeParticles');

  // Drifting embers/particles
  const PARTICLE_COUNT = 22;
  for(let i=0;i<PARTICLE_COUNT;i++){
    const p = document.createElement('span');
    const left = Math.random()*100;
    const delay = Math.random()*8;
    const duration = 6 + Math.random()*7;
    const drift = (Math.random()*60-30)+'px';
    p.style.left = left+'%';
    p.style.bottom = (Math.random()*20-10)+'%';
    p.style.animationDuration = duration+'s';
    p.style.animationDelay = delay+'s';
    p.style.setProperty('--drift', drift);
    p.style.opacity = (0.3 + Math.random()*0.5).toFixed(2);
    particlesEl.appendChild(p);
  }

  const AUTO_ENTER_MS = 10000;
  let entered = false;
  let startTime = performance.now();
  let rafId = null;

  function tickProgress(){
    const elapsed = performance.now() - startTime;
    const pct = Math.min(100, (elapsed / AUTO_ENTER_MS) * 100);
    progressEl.style.width = pct + '%';
    if(elapsed >= AUTO_ENTER_MS){
      enterArchive();
      return;
    }
    rafId = requestAnimationFrame(tickProgress);
  }
  rafId = requestAnimationFrame(tickProgress);

  function enterArchive(){
    if(entered) return;
    entered = true;
    cancelAnimationFrame(rafId);
    homeEl.classList.add('leaving');
    setTimeout(() => { window.location.href = ARCHIVE_URL; }, 650);
  }

  enterBtn.addEventListener('click', enterArchive);
  window.addEventListener('keydown', (e) => {
    if(entered) return;
    if(e.key === 'Enter') enterArchive();
  });
</script>
</body>
</html>
