<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULTIVERSE FILE — The Complete MCU Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#380147;
    --void-2:#980909;
    --indigo:#e0dcf6;
    --indigo-2:#9179f8;
    --silver:#8f9dc0;
    --silver-dim:#8b8d9a;
    --white:#f3e8f1;
    --red:#e0263c;
    --red-dim:#7a1420;
    --gold:#e6c585;
    --gold-dim:#e0c9a0;
    --line: rgba(213, 221, 238, 0.538);
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  html,body{
    background:var(--void);
    color:var(--white);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
  }

  ::selection{ background:var(--red); color:var(--white); }

  /* ===================== PARALLAX BACKGROUND ===================== */
  .parallax-stage{
    position:fixed;
    inset:0;
    z-index:0;
    overflow:hidden;
    background:radial-gradient(ellipse at 50% 0%, var(--indigo) 0%, var(--void) 55%);
  }
  .layer{
    position:absolute;
    inset:-10%;
    will-change:transform;
    transition:transform 0.15s ease-out;
  }
  /* Far layer: starfield dots */
  .layer-far{
    background-image:
      radial-gradient(1.5px 1.5px at 10% 20%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 80% 10%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1.5px 1.5px at 30% 85%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 45% 35%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 15% 55%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 70% 90%, rgba(255,255,255,0.4), transparent);
    background-size:100% 100%;
    opacity:0.8;
  }
  /* Mid layer: fractured shard panels (vibranium/energy shard motif) */
  .layer-mid{ opacity:0.5; }
  .shard{
    position:absolute;
    background:linear-gradient(135deg, rgba(176,138,62,0.12), rgba(224,38,60,0.06));
    border:1px solid rgba(201,205,214,0.08);
    backdrop-filter:blur(1px);
  }
  /* Near layer: glow that tracks cursor */
  .layer-near{
    background:radial-gradient(circle 380px at var(--mx,50%) var(--my,50%), rgba(224,38,60,0.16), transparent 70%);
    mix-blend-mode:screen;
  }
  .layer-glow2{
    background:radial-gradient(circle 280px at var(--mx,50%) var(--my,50%), rgba(176,138,62,0.10), transparent 65%);
    mix-blend-mode:screen;
  }
  .grid-floor{
    position:absolute;
    left:0; right:0; bottom:0; height:45%;
    background-image:
      linear-gradient(rgba(201,205,214,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,205,214,0.06) 1px, transparent 1px);
    background-size:48px 48px;
    -webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            mask-image:linear-gradient(to top, rgba(0,0,0,0.7), transparent);
    transform:perspective(400px) rotateX(55deg);
    transform-origin:bottom;
  }

  /* ===================== NOISE / VIGNETTE ===================== */
  .vignette{
    position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(ellipse at 50% 40%, transparent 40%, rgba(0,0,0,0.55) 100%);
  }

  /* ===================== LAYOUT ===================== */
  .page{ position:relative; z-index:2; min-height:100vh; }

  header{
    padding:48px 6vw 28px;
    display:flex; flex-direction:column; gap:6px;
  }
  .eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--gold);
    display:flex; align-items:center; gap:10px;
  }
  .eyebrow::before{
    content:'';
    width:7px; height:7px;
    background:var(--red);
    border-radius:50%;
    box-shadow:0 0 8px var(--red);
  }
  h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(42px, 7vw, 92px);
    letter-spacing:0.03em;
    line-height:0.95;
    color:var(--white);
    text-shadow:0 0 40px rgba(224,38,60,0.25);
  }
  h1 span{ color:var(--red); }
  .subhead{
    font-size:15px;
    color:var(--silver-dim);
    max-width:560px;
    margin-top:4px;
    line-height:1.5;
  }

  /* ===================== CONTROLS ===================== */
  .controls{
    position:sticky; top:0; z-index:10;
    margin-top:18px;
    padding:16px 6vw;
    background:rgba(10,10,14,0.72);
    backdrop-filter:blur(14px) saturate(140%);
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    display:flex; flex-wrap:wrap; gap:14px;
    align-items:center;
    justify-content:space-between;
  }
  .feature-toggle{
    display:flex; gap:2px;
    background:var(--void-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:3px;
  }
  .feature-toggle button{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:9px 18px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:var(--silver-dim);
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .feature-toggle button.active{
    background:var(--red);
    color:var(--white);
    box-shadow:0 2px 12px rgba(224,38,60,0.4);
  }
  .feature-toggle button:not(.active):hover{ color:var(--white); }

  .sort-toggle{
    display:flex; gap:2px;
    background:var(--void-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:3px;
  }
  .sort-toggle button{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    padding:8px 14px;
    border-radius:6px;
    border:none;
    background:transparent;
    color:var(--silver-dim);
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .sort-toggle button.active{
    background:var(--gold-dim);
    color:var(--white);
  }

  .search-wrap{
    position:relative;
    flex:1;
    min-width:200px;
    max-width:340px;
  }
  .search-wrap input{
    width:100%;
    background:var(--void-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:10px 14px 10px 36px;
    color:var(--white);
    font-size:13px;
    font-family:'Inter',sans-serif;
  }
  .search-wrap input:focus{ outline:2px solid var(--red); outline-offset:1px; }
  .search-wrap input::placeholder{ color:var(--silver-dim); }
  .search-icon{
    position:absolute; left:12px; top:50%; transform:translateY(-50%);
    width:14px; height:14px; opacity:0.5;
  }

  /* A-Z rail */
  .az-rail{
    display:flex; flex-wrap:wrap; gap:4px;
    padding:18px 6vw 6px;
  }
  .az-rail button{
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    width:26px; height:26px;
    border-radius:5px;
    border:1px solid var(--line);
    background:transparent;
    color:var(--silver-dim);
    cursor:pointer;
    transition:all 0.15s ease;
  }
  .az-rail button:hover{ border-color:var(--gold); color:var(--gold); }
  .az-rail button.active{ background:var(--gold); color:var(--void); border-color:var(--gold); }
  .az-rail button:disabled{ opacity:0.25; cursor:default; }
  .az-rail button:disabled:hover{ border-color:var(--line); color:var(--silver-dim); }

  /* ===================== GRID ===================== */
  .archive-meta{
    padding:20px 6vw 4px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--silver-dim);
  }
  .archive-meta b{ color:var(--gold); }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(190px, 1fr));
    gap:22px;
    padding:18px 6vw 100px;
  }

  .card{
    position:relative;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    border:1px solid var(--line);
    background:var(--void-2);
    transition:transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    opacity:0;
    transform:translateY(14px);
    animation:cardIn 0.5s ease forwards;
  }
  @keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }

  .card:hover{
    transform:translateY(-6px);
    border-color:var(--red-dim);
    box-shadow:0 16px 32px -8px rgba(0,0,0,0.6), 0 0 0 1px rgba(224,38,60,0.25);
  }
  .card:focus-visible{ outline:2px solid var(--red); outline-offset:2px; }

  .poster{
    position:relative;
    aspect-ratio:2/3;
    display:flex;
    align-items:flex-end;
    padding:12px;
    overflow:hidden;
  }
  .poster::after{
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 55%);
  }
  .poster-tag{
    position:absolute; top:10px; left:10px; z-index:2;
    font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:0.1em; text-transform:uppercase;
    padding:3px 7px;
    border-radius:4px;
    background:rgba(10,10,14,0.7);
    border:1px solid var(--line);
    color:var(--silver);
  }
  .poster-tag.series{ color:var(--gold); border-color:var(--gold-dim); }
  .poster-tag.movie{ color:var(--red); border-color:var(--red-dim); }

  .poster-mark{
    position:relative; z-index:2;
    font-family:'Bebas Neue',sans-serif;
    font-size:15px;
    letter-spacing:0.02em;
    line-height:1.05;
    color:var(--white);
    text-shadow:0 2px 8px rgba(0,0,0,0.8);
  }
  .poster-year{
    position:relative; z-index:2;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--silver-dim);
    margin-top:3px;
  }

  /* ===================== DOSSIER OVERLAY ===================== */
  .dossier-backdrop{
    position:fixed; inset:0; z-index:50;
    background:rgba(6,6,9,0.82);
    backdrop-filter:blur(6px);
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    opacity:0; pointer-events:none;
    transition:opacity 0.25s ease;
  }
  .dossier-backdrop.open{ opacity:1; pointer-events:all; }

  .dossier{
    position:relative;
    width:min(880px, 100%);
    max-height:88vh;
    overflow-y:auto;
    background:var(--void-2);
    border:1px solid var(--line);
    border-radius:14px;
    display:grid;
    grid-template-columns:240px 1fr;
    transform:scale(0.96) translateY(10px);
    transition:transform 0.3s cubic-bezier(.2,.8,.2,1);
  }
  .dossier-backdrop.open .dossier{ transform:scale(1) translateY(0); }

  .dossier-art{
    position:relative;
    padding:24px;
    display:flex; flex-direction:column; justify-content:flex-end;
    border-right:1px solid var(--line);
    min-height:340px;
  }
  .dossier-art .poster-tag{ position:absolute; top:16px; left:16px; }

  .dossier-close{
    position:absolute; top:14px; right:14px; z-index:5;
    width:32px; height:32px;
    border-radius:50%;
    border:1px solid var(--line);
    background:rgba(10,10,14,0.6);
    color:var(--white);
    font-size:16px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .dossier-close:hover{ background:var(--red); border-color:var(--red); }

  .dossier-body{ padding:28px 30px; }
  .dossier-eyebrow{
    font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:0.2em; text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .dossier-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:clamp(28px,4vw,38px);
    line-height:1.0;
    margin-bottom:14px;
    color:var(--white);
  }

  .stat-row{
    display:flex; flex-wrap:wrap; gap:18px;
    margin-bottom:20px;
    padding-bottom:18px;
    border-bottom:1px solid var(--line);
  }
  .stat{ display:flex; flex-direction:column; gap:2px; }
  .stat-label{
    font-family:'JetBrains Mono',monospace;
    font-size:9px; letter-spacing:0.12em; text-transform:uppercase;
    color:var(--silver-dim);
  }
  .stat-value{ font-size:14px; font-weight:600; color:var(--white); }

  .section-label{
    font-family:'JetBrains Mono',monospace;
    font-size:10px; letter-spacing:0.18em; text-transform:uppercase;
    color:var(--silver-dim);
    margin-bottom:8px;
    margin-top:18px;
  }
  .cast-list{ display:flex; flex-wrap:wrap; gap:8px; }
  .cast-chip{
    font-size:12.5px;
    padding:6px 11px;
    border-radius:20px;
    background:var(--void);
    border:1px solid var(--line);
    color:var(--silver);
  }
  .cast-chip b{ color:var(--white); font-weight:600; }

  .prewatch-list{ display:flex; flex-direction:column; gap:6px; }
  .prewatch-item{
    display:flex; align-items:baseline; gap:8px;
    font-size:13px; color:var(--silver);
  }
  .prewatch-item::before{
    content:'▸';
    color:var(--red);
    font-size:11px;
  }
  .synopsis{ font-size:13.5px; line-height:1.6; color:var(--silver); margin-top:18px;}

  /* ===================== EMPTY STATE ===================== */
  .empty-state{
    grid-column:1/-1;
    text-align:center;
    padding:80px 20px;
    color:var(--silver-dim);
  }
  .empty-state .em-title{
    font-family:'Bebas Neue',sans-serif;
    font-size:28px;
    color:var(--white);
    margin-bottom:8px;
  }

  footer{
    position:relative; z-index:2;
    padding:28px 6vw 48px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    color:var(--silver-dim);
    border-top:1px solid var(--line);
    display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px;
  }

  @media (max-width:680px){
    .dossier{ grid-template-columns:1fr; }
    .dossier-art{ min-height:220px; border-right:none; border-bottom:1px solid var(--line); }
    .controls{ flex-direction:column; align-items:stretch; }
    .search-wrap{ max-width:none; }
  }

  @media (prefers-reduced-motion: reduce){
    .layer{ transition:none; }
    .card{ animation:none; opacity:1; transform:none; }
  }
</style>
</head>
<body>

<div class="parallax-stage" id="stage">
  <div class="layer layer-far" id="layerFar"></div>
  <div class="layer layer-mid" id="layerMid"></div>
  <div class="grid-floor" id="layerFloor"></div>
  <div class="layer layer-glow2" id="layerGlow2"></div>
  <div class="layer layer-near" id="layerNear"></div>
</div>
<div class="vignette"></div>

<div class="page">
  <header>
    <div class="eyebrow">Classified — Multiverse Records Division</div>
    <h1>THE <span>IPK's Marvel</span></h1>
    <p class="subhead">Every theatrical file and streaming dossier from the Marvel Cinematic Universe, indexed and cross-referenced for field agents. Tap any entry to pull its full record.</p>
  </header>

  <div class="controls">
    <div class="feature-toggle" id="typeToggle">
      <button data-type="all" class="active">All Files</button>
      <button data-type="movie">Movies</button>
      <button data-type="series">Series</button>
    </div>
    <div class="sort-toggle" id="sortToggle">
      <button data-sort="chrono" class="active">Chronological</button>
      <button data-sort="az">A–Z</button>
    </div>
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search the archive…" autocomplete="off">
    </div>
  </div>

  <div class="az-rail" id="azRail"></div>

  <div class="archive-meta" id="archiveMeta"></div>

  <div class="grid" id="grid"></div>

  <footer>
    <span>MULTIVERSE FILE — fan-built archive, unaffiliated with Marvel Studios</span>
    <span id="countFooter"></span>
  </footer>
</div>

<div class="dossier-backdrop" id="dossierBackdrop">
  <div class="dossier" role="dialog" aria-modal="true" id="dossierBox">
    <button class="dossier-close" id="dossierClose" aria-label="Close">✕</button>
    <div class="dossier-art" id="dossierArt"></div>
    <div class="dossier-body" id="dossierBody"></div>
  </div>
</div>

DATA.forEach(d => { d.letter = d.t.replace(/^(The |A )/i,'').charAt(0).toUpperCase(); });

/* ============================================================
   PARALLAX ENGINE
   ============================================================ */
const stage = document.getElementById('stage');
const layerFar = document.getElementById('layerFar');
const layerMid = document.getElementById('layerMid');
const layerFloor = document.getElementById('layerFloor');
const layerNear = document.getElementById('layerNear');
const layerGlow2 = document.getElementById('layerGlow2');

// Build fractured shard panels for mid layer
(function buildShards(){
  const count = 14;
  for(let i=0;i<count;i++){
    const s = document.createElement('div');
    s.className = 'shard';
    const w = 60 + Math.random()*160;
    const h = 60 + Math.random()*160;
    s.style.width = w+'px';
    s.style.height = h+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.transform = `rotate(${Math.random()*60-30}deg)`;
    s.style.borderRadius = Math.random() > 0.6 ? '50%' : '4px';
    layerMid.appendChild(s);
  }
})();

let targetX = 0.5, targetY = 0.5;
let curX = 0.5, curY = 0.5;

window.addEventListener('mousemove', (e) => {
  targetX = e.clientX / window.innerWidth;
  targetY = e.clientY / window.innerHeight;
});

window.addEventListener('touchmove', (e) => {
  if(e.touches[0]){
    targetX = e.touches[0].clientX / window.innerWidth;
    targetY = e.touches[0].clientY / window.innerHeight;
  }
}, {passive:true});

function lerp(a,b,t){ return a + (b-a)*t; }

function animate(){
  curX = lerp(curX, targetX, 0.06);
  curY = lerp(curY, targetY, 0.06);

  const dx = (curX - 0.5);
  const dy = (curY - 0.5);

  layerFar.style.transform = `translate(${dx * -18}px, ${dy * -18}px)`;
  layerMid.style.transform = `translate(${dx * -42}px, ${dy * -42}px) rotate(${dx*1.5}deg)`;
  layerFloor.style.transform = `perspective(400px) rotateX(55deg) translate(${dx * 14}px, ${dy*6}px)`;

  stage.style.setProperty('--mx', (curX*100)+'%');
  stage.style.setProperty('--my', (curY*100)+'%');

  requestAnimationFrame(animate);
}
animate();

/* ============================================================
   POSTER PLACEHOLDER (gradient block using hue seed)
   ============================================================ */
function posterStyle(hue){
  const [h,s,l] = hue;
  return `background:
    linear-gradient(160deg, hsl(${h} ${s}% ${Math.min(l+14,70)}%) 0%, hsl(${h} ${Math.max(s-10,10)}% ${Math.max(l-18,8)}%) 60%, hsl(${(h+30)%360} ${s}% ${Math.max(l-28,5)}%) 100%);`;
}

/* ============================================================
   RENDER LOGIC
   ============================================================ */
const grid = document.getElementById('grid');
const archiveMeta = document.getElementById('archiveMeta');
const countFooter = document.getElementById('countFooter');
const azRail = document.getElementById('azRail');
const searchInput = document.getElementById('searchInput');

let state = { type:'all', sort:'chrono', letter:null, query:'' };

function buildAZRail(){
  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split('');
  const present = new Set(DATA.map(d=>d.letter));
  azRail.innerHTML = '';
  const allBtn = document.createElement('button');
  allBtn.textContent = '✦';
  allBtn.title = 'All letters';
  allBtn.className = state.letter===null ? 'active' : '';
  allBtn.addEventListener('click', ()=>{ state.letter=null; render(); });
  azRail.appendChild(allBtn);
  letters.forEach(L=>{
    const b = document.createElement('button');
    b.textContent = L;
    const has = present.has(L);
    if(!has) b.disabled = true;
    if(state.letter === L) b.classList.add('active');
    b.addEventListener('click', ()=>{ if(has){ state.letter = (state.letter===L? null : L); render(); } });
    azRail.appendChild(b);
  });
}

function getFiltered(){
  let list = DATA.slice();
  if(state.type !== 'all') list = list.filter(d => d.type === state.type);
  if(state.letter) list = list.filter(d => d.letter === state.letter);
  if(state.query.trim()){
    const q = state.query.trim().toLowerCase();
    list = list.filter(d => d.t.toLowerCase().includes(q) || d.cast.some(c=>c.toLowerCase().includes(q)));
  }
  if(state.sort === 'az'){
    list.sort((a,b)=> a.t.localeCompare(b.t));
  } else {
    list.sort((a,b)=> new Date(a.date) - new Date(b.date));
  }
  return list;
}

function render(){
  buildAZRail();
  const list = getFiltered();
  grid.innerHTML = '';

  archiveMeta.innerHTML = `Showing <b>${list.length}</b> of ${DATA.length} records — sorted ${state.sort==='az' ? 'A to Z' : 'chronologically by release'}${state.letter ? ` — letter <b>${state.letter}</b>` : ''}`;
  countFooter.textContent = `${DATA.length} records on file`;

  if(list.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="em-title">No matching files</div><div>Try a different letter, type, or search term.</div>`;
    grid.appendChild(empty);
    return;
  }

  list.forEach((d, i) => {
    const card = document.createElement('button');
    card.className = 'card';
    card.style.animationDelay = (i*0.02)+'s';
    card.setAttribute('aria-label', `Open dossier for ${d.t}`);
    card.innerHTML = `
      <div class="poster" style="${posterStyle(d.hue)}">
        <span class="poster-tag ${d.type}">${d.type === 'series' ? 'Series' : 'Movie'}</span>
        <div>
          <div class="poster-mark">${d.t}</div>
          <div class="poster-year">${d.date}</div>
        </div>
      </div>
    `;
    card.addEventListener('click', () => openDossier(d));
    grid.appendChild(card);
  });
}

/* ============================================================
   DOSSIER (DETAIL VIEW)
   ============================================================ */
const backdrop = document.getElementById('dossierBackdrop');
const dossierArt = document.getElementById('dossierArt');
const dossierBody = document.getElementById('dossierBody');

function openDossier(d){
  dossierArt.style.cssText += posterStyle(d.hue);
  dossierArt.innerHTML = `<span class="poster-tag ${d.type}">${d.type === 'series' ? 'Series' : 'Movie'}</span>
    <div class="poster-mark" style="font-size:22px;">${d.t}</div>`;

  const lengthLabel = d.type === 'series' ? 'Episodes' : 'Runtime';
  dossierBody.innerHTML = `
    <div class="dossier-eyebrow">File #${String(DATA.indexOf(d)+1).padStart(3,'0')} — Phase record</div>
    <div class="dossier-title">${d.t}</div>
    <div class="stat-row">
      <div class="stat"><span class="stat-label">Release Date</span><span class="stat-value">${d.date}</span></div>
      <div class="stat"><span class="stat-label">${lengthLabel}</span><span class="stat-value">${d.runtime}</span></div>
      <div class="stat"><span class="stat-label">Type</span><span class="stat-value">${d.type === 'series' ? 'Streaming Series' : 'Feature Film'}</span></div>
    </div>
    <div class="section-label">Principal Cast</div>
    <div class="cast-list">${d.cast.map(c=>`<span class="cast-chip"><b>${c}</b></span>`).join('')}</div>
    <div class="section-label">Pre-Watch Recommendation</div>
    <div class="prewatch-list">${d.pre.map(p=>`<div class="prewatch-item">${p}</div>`).join('')}</div>
  `;
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDossier(){
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('dossierClose').addEventListener('click', closeDossier);
backdrop.addEventListener('click', (e) => { if(e.target === backdrop) closeDossier(); });
window.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeDossier(); });

/* ============================================================
   CONTROLS WIRING
   ============================================================ */
document.getElementById('typeToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#typeToggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.type = btn.dataset.type;
  render();
});

document.getElementById('sortToggle').addEventListener('click', (e) => {
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#sortToggle button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  state.sort = btn.dataset.sort;
  render();
});

searchInput.addEventListener('input', (e) => {
  state.query = e.target.value;
  render();
});

render();
</script>
